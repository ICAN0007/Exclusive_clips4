<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Exclusive premium content streaming platform">
  <meta name="theme-color" content="#0a0a0a">
  <title>Exclusive Content - Premium Streaming</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <a href="index.html" class="logo">
        <span class="logo-icon">🔥</span>
        <span class="logo-text">EXCLUSIVE</span>
      </a>
      
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search videos..." class="search-input">
      </div>
      
      <div class="header-actions">
        <!-- Mobile search toggle -->
        <button class="btn-icon mobile-only" id="searchBtn" aria-label="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
        </button>
        
        <!-- Mobile menu toggle -->
        <button class="btn-icon mobile-only" id="mobileMenuBtn" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        
        <!-- Desktop buttons -->
        <button class="btn btn-secondary desktop-only">Upload</button>
        <button class="btn btn-primary desktop-only">Sign In</button>
      </div>
    </div>
    <div class="categories" id="categories">
      <!-- Categories will be populated by JS -->
    </div>
  </header>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-content">
      <button class="mobile-menu-close" id="closeMobileMenu" aria-label="Close menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <nav class="mobile-nav">
        <a href="index.html" class="mobile-nav-link active">Home</a>
        <a href="#" class="mobile-nav-link">Upload</a>
        <a href="#" class="mobile-nav-link">Sign In</a>
        <a href="privacy-policy.html" class="mobile-nav-link">Privacy Policy</a>
      </nav>
    </div>
  </div>

  <!-- Hero Section -->
  <section class="hero">
    <h1 class="hero-title">
      <span class="gradient-text">EXCLUSIVE</span> CONTENT
    </h1>
    <p class="hero-subtitle">Premium streaming experience with ultra HD quality</p>
    <button class="btn btn-primary btn-large" onclick="scrollToVideos()">
      Explore Now
    </button>
  </section>

  <!-- Videos Section -->
  <section class="videos-section" id="videos-section">
    <h2 class="section-title gradient-text">🔥 TRENDING NOW</h2>
    <div class="video-grid" id="videoGrid">
      <!-- Videos will be populated by JS -->
    </div>
  </section>

  <!-- Recommended Section -->
  <section class="recommended-section">
    <h2 class="section-title gradient-text">✨ RECOMMENDED FOR YOU</h2>
    <p class="section-subtitle">Handpicked selections based on what's popular and trending.</p>
    <div class="video-grid" id="recommendedGrid">
      <!-- Recommended videos will be populated by JS -->
    </div>
  </section>

  <!-- Video Player Modal -->
  <div class="modal" id="videoModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()" aria-label="Close video">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="video-container" id="videoContainer">
        <!-- Bunny.net responsive embed will be injected here -->
      </div>
      <div class="video-info">
        <h3 id="videoTitle"></h3>
        <div class="video-meta">
          <span id="videoDuration"></span>
          <span id="videoViews"></span>
        </div>
        <div class="video-tags" id="videoTags"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <p>&copy; 2024 Exclusive Content. All rights reserved.</p>
      <a href="privacy-policy.html">Privacy Policy</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
